<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #dddddd; background-color: #f9f9f9;">

    <div style="text-align: center; padding: 20px 0; border-bottom: 1px solid #ddd;">
        <img src='cid:logoImage' alt="YogiJosim Logo" style="max-width: 150px; height: auto;">
    </div>

    <div style="padding: 20px; background-color: #ffffff;">
        <h2 style="font-size: 20px; color: #333333; text-align: center;">위험 정보 리포트</h2>
        <p style="font-size: 16px; color: #555555; line-height: 1.6;">
            구독하신 지역에서 발생한 새로운 사건/사고 정보입니다. 항상 주변을 살피고 안전에 유의하세요.
        </p>

        <div th:each="incident : ${incidents}" style="margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
            <h3 style="font-size: 18px; color: #444; margin: 0 0 10px 0;" th:text="${incident.summary}">
                사건 요약 제목
            </h3>
            <p style="font-size: 15px; color: #333333; margin: 0; line-height: 1.6;">
                <strong>위치:</strong> <span th:text="${incident.location}"></span><br>
                <strong>종류:</strong> <span th:text="${incident.category.description}"></span><br>
                <strong>위험도:</strong> <span th:text="${incident.dangerLevel}"></span> / 5
            </p>
        </div>
    </div>

    <div style="text-align: center; padding: 20px; font-size: 12px; color: #777;">
        <p>본 메일은 여기조심 서비스 구독자에게 발송되는 메일입니다.</p>
        <p><a href="#" style="color: #0012ce; text-decoration: none;">구독 취소</a></p>
    </div>
</div>
</body>
</html>
