services:
  spring-blue:
    image: ${DOCKER_USERNAME}/yogi-josim-spring-app:latest
    ports:
      - "8081:8080"  # 내부 8080, 외부 8081로 매핑
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - custom-network

  spring-green:
    image: ${DOCKER_USERNAME}/yogi-josim-spring-app:latest
    ports:
      - "8082:8080"  # 내부 8080, 외부 8082로 매핑
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - custom-network

  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - custom-network
    environment:
      TZ: Asia/Seoul
      LANG: C.UTF-8

  scraper-api:
    image: ${DOCKER_USERNAME}/yogi-josim-fastapi-scraper:latest
    container_name: scraper-api
    ports:
      - "8001:8000"
    networks:
      - custom-network
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    shm_size: '2gb'
    restart: always

networks:
  custom-network:
    driver: bridge

volumes:
  db-data:
